version: "3.2"

services:
  papercups:
    # Build the papercups75 fork from this repo's Dockerfile.
    # (The old `image: papercups/papercups:latest` pulled the UPSTREAM prebuilt
    # image, which does not contain this fork's changes.)
    build:
      context: .
    image: papercups75:local
    restart: always
    ports:
      - "3000:3000"
      - "4000:4000"
    command: sh -c "sleep 10 && /entrypoint.sh db createdb && /entrypoint.sh db migrate && echo 'running' && /entrypoint.sh run"
    depends_on:
      - db
    environment:
      # Credentials are read from the environment (e.g. a local .env file) so
      # no real secret is committed to the repo. Generate the secret key base
      # with `mix phx.gen.secret` (or `openssl rand -base64 64`) and set a
      # strong POSTGRES_PASSWORD; compose fails fast if either is unset.
      DATABASE_URL: "ecto://postgres:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}@db/postgres"
      SECRET_KEY_BASE: "${SECRET_KEY_BASE:?set SECRET_KEY_BASE (>= 64 bytes, e.g. mix phx.gen.secret)}"
      BACKEND_URL: "localhost"
      MIX_ENV: "prod"
      REQUIRE_DB_SSL: "false"
      REACT_APP_FILE_UPLOADS_ENABLED: 1
      # Replace with your domain name
      REACT_APP_URL: "app.papercups.io"
  db:
    image: postgres:alpine
    restart: always
    container_name: papercups
    ports:
      - "5432:5432"
    environment:
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}"
