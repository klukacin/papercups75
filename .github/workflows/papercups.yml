name: Papercups

on:
  push:
    branches: [master]
  pull_request:

env:
  # Keep in sync with .tool-versions / the SessionStart hook and Dockerfile.
  ELIXIR_VERSION: "1.18.4"
  OTP_VERSION: "27.3"
  NODE_VERSION: "22"

jobs:
  mix-format:
    name: Mix Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: ${{ env.ELIXIR_VERSION }}
          otp-version: ${{ env.OTP_VERSION }}

      - name: Restore deps cache
        uses: actions/cache@v4
        with:
          path: |
            deps
            _build
          key: ${{ runner.os }}-mix-${{ env.OTP_VERSION }}-${{ env.ELIXIR_VERSION }}-${{ hashFiles('mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-mix-${{ env.OTP_VERSION }}-${{ env.ELIXIR_VERSION }}-

      - name: Install dependencies
        run: mix deps.get

      - name: Run format check
        run: mix format --check-formatted

  prettier:
    name: Prettier
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: assets/package-lock.json

      - name: Install dependencies
        run: npm install --prefix assets --legacy-peer-deps

      - name: Run format check
        run: npm run prettier:check --prefix assets

  build-ui:
    name: Build UI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: assets/package-lock.json

      - name: Install dependencies
        run: npm install --prefix assets --legacy-peer-deps

      - name: Run build
        run: npm run build --prefix assets

  ui-test:
    name: UI Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: assets/package-lock.json

      - name: Install dependencies
        run: npm install --prefix assets --legacy-peer-deps

      - name: Typecheck
        run: npm run typecheck --prefix assets

      - name: Run tests
        run: npm test --prefix assets
        env:
          CI: "true"

  mix-test:
    name: Mix Test
    runs-on: ubuntu-latest
    env:
      MIX_ENV: test
      ELIXIR_ENV: test
      DATABASE_HOST: localhost
      DATABASE_USER: postgres
      DATABASE_PORT: 5432
      DATABASE_PASSWORD: postgres
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: "postgres"
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - name: Set up Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: ${{ env.ELIXIR_VERSION }}
          otp-version: ${{ env.OTP_VERSION }}

      - name: Restore deps cache
        uses: actions/cache@v4
        with:
          path: |
            deps
            _build
          key: ${{ runner.os }}-mix-${{ env.OTP_VERSION }}-${{ env.ELIXIR_VERSION }}-${{ hashFiles('mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-mix-${{ env.OTP_VERSION }}-${{ env.ELIXIR_VERSION }}-

      - name: Install dependencies
        run: mix deps.get

      # PageController serves priv/static/index.html and replaces the
      # __SERVER_ENV_DATA__ placeholder with window.__ENV__. That file is a
      # frontend-build artifact (produced by the separate "Build UI" job), so it
      # is absent here and ChatApiWeb.PageControllerTest fails with File.Error.
      # Provide a minimal fixture carrying the placeholder so the controller's
      # injection logic can be unit-tested without a full asset build.
      - name: Provide index.html fixture for PageController tests
        run: |
          mkdir -p priv/static
          cat > priv/static/index.html <<'HTML'
          <!doctype html>
          <html>
            <head><meta charset="utf-8"><title>Papercups</title>
            <script>window.__ENV__ = __SERVER_ENV_DATA__;</script></head>
            <body><div id="root"></div></body>
          </html>
          HTML

      - name: Run tests
        run: mix test --exclude lambda_development
